<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint Oncológico — Plan 90 Días · HPM</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --text: #e8eaf6;
    --text2: #8892b0;
    --green: #2ecc71;
    --blue: #3498db;
    --orange: #f39c12;
    --red: #e74c3c;
    --gray: #636e72;
    --gold: #f1c40f;
    --purple: #9b59b6;
    --teal: #1abc9c;
    --phase-w: 280px;
    --layer-h: 90px;
    --sublayer-h: 72px;
    --header-h: 56px;
    --layer-label-w: 180px;
    --panel-w: 420px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 100;
  }
  #topbar .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 15px; color: var(--text);
  }
  #topbar .logo span { color: var(--accent); }
  #topbar .controls { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); font-size: 12px;
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .btn:hover { background: var(--border); color: var(--text); }
  .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red); color: #fff; }
  .btn.success { border-color: var(--green); color: var(--green); }
  .btn.success:hover { background: var(--green); color: #fff; }

  .mode-toggle {
    display: flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  }
  .mode-toggle .btn { border: none; border-radius: 0; }

  /* ── MAIN LAYOUT ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── CANVAS WRAPPER ── */
  #canvas-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
    background: var(--bg);
  }

  #canvas {
    display: grid;
    position: relative;
    min-width: max-content;
  }

  /* ── PHASE HEADERS ── */
  #phase-header-row {
    display: flex;
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--bg);
    border-bottom: 2px solid var(--border);
  }

  .corner-cell {
    width: var(--layer-label-w);
    min-width: var(--layer-label-w);
    height: var(--header-h);
    background: var(--surface);
    border-right: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--text2);
    letter-spacing: 1px; text-transform: uppercase;
    flex-shrink: 0;
    position: sticky; left: 0; z-index: 60;
  }

  .phase-header {
    width: var(--phase-w);
    min-width: var(--phase-w);
    height: var(--header-h);
    display: flex; align-items: center; gap: 10px;
    padding: 0 16px;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }
  .phase-header:hover { background: var(--surface2); }
  .phase-header .ph-icon { font-size: 20px; flex-shrink: 0; }
  .phase-header .ph-info { flex: 1; min-width: 0; }
  .phase-header .ph-label {
    font-size: 10px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 2px;
  }
  .phase-header .ph-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .phase-header .ph-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px; border-radius: 2px;
  }
  .phase-add-btn {
    width: 52px; min-width: 52px; height: var(--header-h);
    display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 22px; cursor: pointer;
    border-left: 1px dashed var(--border);
    transition: all .15s;
  }
  .phase-add-btn:hover { color: var(--accent); background: var(--surface2); }

  /* ── LAYER ROWS ── */
  .layer-row {
    display: flex;
    border-bottom: 1px solid var(--border);
    transition: all .2s;
  }
  .layer-row.collapsed .layer-body { display: none; }
  .layer-row.collapsed .layer-label { border-bottom: none; }

  .layer-label {
    width: var(--layer-label-w);
    min-width: var(--layer-label-w);
    background: var(--surface);
    border-right: 2px solid var(--border);
    position: sticky; left: 0; z-index: 40;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .layer-label-main {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    cursor: pointer;
    min-height: var(--layer-h);
    transition: background .15s;
  }
  .layer-label-main:hover { background: var(--surface2); }

  .layer-icon { font-size: 18px; flex-shrink: 0; }
  .layer-name-wrap { flex: 1; min-width: 0; }
  .layer-name {
    font-size: 11px; font-weight: 700; color: var(--text);
    line-height: 1.3; margin-bottom: 2px;
  }
  .layer-subtitle { font-size: 9px; color: var(--text2); }
  .layer-chevron {
    font-size: 10px; color: var(--text2);
    transition: transform .2s; flex-shrink: 0;
  }
  .layer-row.collapsed .layer-chevron { transform: rotate(-90deg); }

  /* sublayers */
  .sublayer-label {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px 6px 22px;
    border-top: 1px solid var(--border);
    min-height: var(--sublayer-h);
    background: var(--surface);
    cursor: default;
  }
  .sublayer-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .sublayer-name { font-size: 10px; color: var(--text2); font-weight: 600; }

  .layer-body { display: flex; flex: 1; }

  .layer-main-cells { display: flex; }
  .sublayer-rows { display: flex; flex-direction: column; width: 100%; }
  .sublayer-row { display: flex; border-top: 1px solid var(--border); }

  /* ── CELLS ── */
  .cell {
    width: var(--phase-w);
    min-width: var(--phase-w);
    min-height: var(--layer-h);
    border-right: 1px solid var(--border);
    padding: 8px;
    display: flex; flex-wrap: wrap; gap: 6px;
    align-content: flex-start;
    position: relative;
  }
  .cell.sublayer-cell { min-height: var(--sublayer-h); }
  .cell.droptarget { background: rgba(79,142,247,.08); }

  .cell-add {
    width: 28px; height: 28px;
    border: 1px dashed var(--border); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 16px; cursor: pointer;
    transition: all .15s; flex-shrink: 0; align-self: flex-start;
  }
  .cell-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,.1); }

  /* ── NODES ── */
  .node {
    position: relative;
    border-radius: 8px;
    border: 1.5px solid;
    padding: 6px 8px;
    cursor: pointer;
    transition: all .15s;
    max-width: 220px;
    min-width: 80px;
    background: var(--surface);
  }
  .node:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.4); }

  .node-top { display: flex; align-items: flex-start; gap: 5px; margin-bottom: 4px; }
  .node-type-icon { font-size: 11px; flex-shrink: 0; margin-top: 1px; }
  .node-title { font-size: 11px; font-weight: 700; color: var(--text); line-height: 1.3; flex: 1; }
  .node-badges { display: flex; gap: 3px; flex-wrap: wrap; }
  .badge {
    font-size: 9px; padding: 1px 5px; border-radius: 10px;
    font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
  }
  .node-flags { display: flex; gap: 3px; margin-top: 2px; }
  .flag { font-size: 13px; cursor: default; }

  /* status colors */
  .s-implemented { border-color: var(--green); }
  .s-implemented .node-status-bar { background: var(--green); }
  .s-inprogress { border-color: var(--blue); }
  .s-inprogress .node-status-bar { background: var(--blue); }
  .s-designed { border-color: var(--gray); }
  .s-designed .node-status-bar { background: var(--gray); }
  .s-problem { border-color: var(--red); }
  .s-problem .node-status-bar { background: var(--red); }
  .s-bestpractice { border-color: var(--gold); }
  .s-bestpractice .node-status-bar { background: var(--gold); }
  .s-notstarted { border-color: var(--border); opacity: .7; }
  .s-notstarted .node-status-bar { background: var(--border); }

  .node-status-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px; border-radius: 6px 6px 0 0;
  }

  /* type badges */
  .type-action { background: rgba(79,142,247,.2); color: var(--accent); }
  .type-touchpoint { background: rgba(155,89,182,.2); color: var(--purple); }

  /* ── PANEL LATERAL ── */
  #side-panel {
    width: var(--panel-w);
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: width .25s ease;
    flex-shrink: 0;
  }
  #side-panel.closed { width: 0; border-left: none; }

  #panel-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  #panel-title { font-size: 14px; font-weight: 700; color: var(--text); }
  #panel-close {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  #panel-close:hover { background: var(--red); color: #fff; border-color: var(--red); }

  #panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; }

  .field-group { margin-bottom: 16px; }
  .field-label {
    font-size: 10px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px;
    display: block;
  }
  .field-input, .field-textarea, .field-select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 8px 10px;
    font-size: 12px; font-family: inherit;
    transition: border-color .15s; resize: vertical;
  }
  .field-input:focus, .field-textarea:focus, .field-select:focus {
    outline: none; border-color: var(--accent);
  }
  .field-textarea { min-height: 72px; }

  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .status-opt {
    padding: 7px 10px; border-radius: 6px; border: 1.5px solid var(--border);
    font-size: 11px; font-weight: 600; cursor: pointer; text-align: center;
    transition: all .15s;
  }
  .status-opt:hover { opacity: .8; transform: scale(1.02); }
  .status-opt.selected { opacity: 1; }

  .flag-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .flag-btn {
    padding: 5px 10px; border-radius: 20px; border: 1.5px solid var(--border);
    font-size: 12px; cursor: pointer; background: var(--surface2);
    transition: all .15s;
  }
  .flag-btn.active { border-color: var(--accent); background: rgba(79,142,247,.2); }
  .flag-btn:hover { border-color: var(--accent); }

  .type-grid { display: flex; gap: 8px; margin-top: 4px; }
  .type-btn {
    flex: 1; padding: 7px; border-radius: 6px; border: 1.5px solid var(--border);
    font-size: 11px; font-weight: 600; cursor: pointer; text-align: center;
    background: var(--surface2); color: var(--text2); transition: all .15s;
  }
  .type-btn.active-action { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,.15); }
  .type-btn.active-touchpoint { border-color: var(--purple); color: var(--purple); background: rgba(155,89,182,.15); }

  #panel-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; flex-shrink: 0;
  }
  #btn-save { flex: 1; padding: 9px; border-radius: 6px; border: none;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity .15s; }
  #btn-save:hover { opacity: .85; }
  #btn-delete { padding: 9px 14px; border-radius: 6px; border: 1.5px solid var(--red);
    background: transparent; color: var(--red); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all .15s; }
  #btn-delete:hover { background: var(--red); color: #fff; }

  /* ── PRESENTATION MODE ── */
  body.presentation #topbar .edit-only { display: none; }
  body.presentation .cell-add { display: none; }
  body.presentation #side-panel { width: 0 !important; border: none; }
  body.presentation .node { cursor: default; }
  body.presentation #topbar { background: #060810; border-bottom-color: #111; }

  /* ── LEGEND ── */
  #legend {
    padding: 8px 20px; background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text2); }
  .leg-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* ── MODAL ── */
  #modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    display: none; align-items: center; justify-content: center; z-index: 200;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; width: 400px; max-width: 90vw;
  }
  #modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--text); }
  #modal .field-group { margin-bottom: 12px; }
  #modal-footer { display: flex; gap: 8px; margin-top: 16px; }
  #modal-footer .btn { flex: 1; padding: 9px; border-radius: 6px; font-size: 13px; font-weight: 700; }
  #modal-confirm { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text2); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">
    <span>⬡</span> Blueprint Oncológico <span style="color:var(--text2);font-weight:400;font-size:12px;margin-left:4px">Plan 90 Días · HPM / SSDR</span>
  </div>
  <div class="controls">
    <div class="mode-toggle edit-only">
      <button class="btn active" id="btn-work" onclick="setMode('work')">⚙ Trabajo</button>
      <button class="btn" id="btn-pres" onclick="setMode('presentation')">▶ Presentación</button>
    </div>
    <button class="btn edit-only" onclick="openAddPhase()">+ Fase</button>
    <button class="btn edit-only" onclick="exportData()">↓ Exportar</button>
    <button class="btn" onclick="importData()">↑ Importar</button>
    <button class="btn" id="btn-pres2" style="display:none" onclick="setMode('work')">← Edición</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="canvas-wrap">
    <div id="canvas"></div>
  </div>
  <div id="side-panel" class="closed">
    <div id="panel-header">
      <div id="panel-title">Nodo</div>
      <button id="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div id="panel-body">
      <div class="field-group">
        <label class="field-label">Título</label>
        <input class="field-input" id="f-title" placeholder="Nombre del nodo">
      </div>
      <div class="field-group">
        <label class="field-label">Tipo</label>
        <div class="type-grid">
          <div class="type-btn active-action" id="t-action" onclick="setType('action')">⚡ Acción</div>
          <div class="type-btn" id="t-touchpoint" onclick="setType('touchpoint')">◎ Touchpoint</div>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Actor responsable</label>
        <input class="field-input" id="f-actor" placeholder="Ej: Navegador, Médico, FONASA...">
      </div>
      <div class="field-group">
        <label class="field-label">Descripción</label>
        <textarea class="field-textarea" id="f-desc" placeholder="Describe la acción o touchpoint..."></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">Estado</label>
        <div class="status-grid" id="status-grid"></div>
      </div>
      <div class="field-group">
        <label class="field-label">Marcadores</label>
        <div class="flag-grid" id="flag-grid"></div>
      </div>
      <div class="field-group">
        <label class="field-label">Notas adicionales</label>
        <textarea class="field-textarea" id="f-notes" placeholder="Observaciones, brechas, oportunidades..."></textarea>
      </div>
    </div>
    <div id="panel-footer">
      <button id="btn-save" onclick="saveNode()">Guardar</button>
      <button id="btn-delete" onclick="deleteNode()">Eliminar</button>
    </div>
  </div>
</div>

<!-- LEGEND -->
<div id="legend">
  <span style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px">Estados:</span>
  <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Implementado</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--blue)"></div>En Proceso</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--gray)"></div>Diseñado</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Problema</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--gold)"></div>Buena Práctica</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--border)"></div>No Iniciado</div>
  <span style="margin-left:12px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px">Tipos:</span>
  <div class="leg-item">⚡ Acción</div>
  <div class="leg-item">◎ Touchpoint</div>
  <div class="leg-item">🚩 Red Flag</div>
  <div class="leg-item">⭐ Buena Práctica</div>
  <div class="leg-item">⚠️ Alerta</div>
  <div class="leg-item">🔗 Vinculación</div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">Nueva Fase</h3>
    <div class="field-group">
      <label class="field-label">Nombre de la fase</label>
      <input class="field-input" id="modal-name" placeholder="Ej: Diagnóstico Confirmatorio">
    </div>
    <div class="field-group">
      <label class="field-label">Ícono (emoji)</label>
      <input class="field-input" id="modal-icon" placeholder="🔬" style="font-size:18px">
    </div>
    <div class="field-group">
      <label class="field-label">Color de fase</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px" id="modal-colors"></div>
    </div>
    <div id="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-modal-confirm" id="modal-confirm" onclick="confirmModal()">Crear</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  DATA MODEL
// ══════════════════════════════════════════════════
const STATUSES = [
  { id:'implemented', label:'Implementado', color:'var(--green)', cls:'s-implemented' },
  { id:'inprogress',  label:'En Proceso',   color:'var(--blue)',  cls:'s-inprogress' },
  { id:'designed',    label:'Diseñado',     color:'var(--gray)',  cls:'s-designed' },
  { id:'problem',     label:'Problema',     color:'var(--red)',   cls:'s-problem' },
  { id:'bestpractice',label:'Buena Práctica',color:'var(--gold)', cls:'s-bestpractice' },
  { id:'notstarted',  label:'No Iniciado',  color:'var(--border)',cls:'s-notstarted' },
];

const FLAGS = [
  { id:'redflag',  emoji:'🚩', label:'Red Flag' },
  { id:'best',     emoji:'⭐', label:'Buena Práctica' },
  { id:'alert',    emoji:'⚠️', label:'Alerta' },
  { id:'link',     emoji:'🔗', label:'Vinculación' },
  { id:'pending',  emoji:'⏳', label:'Pendiente' },
  { id:'key',      emoji:'🔑', label:'Clave' },
];

const PHASE_COLORS = ['#4f8ef7','#2ecc71','#f39c12','#e74c3c','#9b59b6','#1abc9c','#e67e22','#3498db'];

const DEFAULT_LAYERS = [
  {
    id:'l-patient', icon:'👤', name:'Experiencia del Paciente', subtitle:'4 perfiles',
    color:'#4f8ef7', collapsed:false,
    sublayers:[
      { id:'sl-ges',     name:'Paciente GES Oncológico',        color:'#e74c3c' },
      { id:'sl-noges',   name:'Paciente No GES (Cirugía/CE)',    color:'#f39c12' },
      { id:'sl-cuidador',name:'Familiar / Cuidador',             color:'#9b59b6' },

  return `${layerId}||${sublayerId||''}||${phaseId}`;

// ── LOAD / SAVE ──
function loadState() {
  try {
    const saved = localStorage.getItem('onco_blueprint_v3');
    if (saved) { state = JSON.parse(saved); return; }
  } catch(e) {}
  state.phases = JSON.parse(JSON.stringify(DEFAULT_PHASES));
  state.layers = JSON.parse(JSON.stringify(DEFAULT_LAYERS));
  state.cells = {};
  seedDemoData();
}

function saveState() {
  try { localStorage.setItem('onco_blueprint_v3', JSON.stringify(state)); } catch(e) {}
}

function addNodeToCell(layerId, sublayerId, phaseId, data) {
  const key = makeKey(layerId, sublayerId, phaseId);
  if (!state.cells[key]) state.cells[key] = [];
  state.cells[key].push({ id: uid(), ...data });
}

function uid() { return Math.random().toString(36).slice(2,10); }

// ══════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════
function render() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';

  // Phase header row
  const headerRow = document.createElement('div');
  headerRow.id = 'phase-header-row';

  const corner = document.createElement('div');
  corner.className = 'corner-cell';
  corner.textContent = 'Capas / Fases →';
  headerRow.appendChild(corner);

  state.phases.forEach(phase => {
    const ph = document.createElement('div');
    ph.className = 'phase-header';
    ph.style.borderTop = `3px solid ${phase.color}`;
    ph.innerHTML = `
      <div class="ph-icon">${phase.icon}</div>
      <div class="ph-info">
        <div class="ph-label">${phase.label}</div>
        <div class="ph-name">${phase.name}</div>
      </div>
    `;
    ph.ondblclick = () => openEditPhase(phase.id);
    headerRow.appendChild(ph);
  });

  // Add phase btn
  const addPh = document.createElement('div');
  addPh.className = 'phase-add-btn edit-only';
  addPh.textContent = '+';
  addPh.title = 'Agregar fase';
  addPh.onclick = () => openAddPhase();
  headerRow.appendChild(addPh);
  canvas.appendChild(headerRow);

  // Layer rows
  state.layers.forEach(layer => {
    const row = document.createElement('div');
    row.className = 'layer-row' + (layer.collapsed ? ' collapsed' : '');
    row.id = `row-${layer.id}`;

    // Label column
    const labelCol = document.createElement('div');
    labelCol.className = 'layer-label';

    const labelMain = document.createElement('div');
    labelMain.className = 'layer-label-main';
    labelMain.innerHTML = `
      <div class="layer-icon">${layer.icon}</div>
      <div class="layer-name-wrap">
        <div class="layer-name" style="color:${layer.color}">${layer.name}</div>
        <div class="layer-subtitle">${layer.subtitle}</div>
      </div>
      <div class="layer-chevron">▼</div>
    `;
    labelMain.onclick = () => toggleLayer(layer.id);
    labelCol.appendChild(labelMain);

    // Sublayer labels
    if (layer.sublayers && layer.sublayers.length) {
      layer.sublayers.forEach(sl => {
        const slLabel = document.createElement('div');
        slLabel.className = 'sublayer-label';
        slLabel.innerHTML = `
          <div class="sublayer-dot" style="background:${sl.color}"></div>
          <div class="sublayer-name">${sl.name}</div>
        `;
        labelCol.appendChild(slLabel);
      });
    }
    row.appendChild(labelCol);

    // Body
    const body = document.createElement('div');
    body.className = 'layer-body';

    if (layer.sublayers && layer.sublayers.length) {
      // Main layer cells (empty row for spacing context) + sublayer rows
      const sublayerContainer = document.createElement('div');
      sublayerContainer.className = 'sublayer-rows';
      sublayerContainer.style.width = '100%';

      layer.sublayers.forEach(sl => {
        const slRow = document.createElement('div');
        slRow.className = 'sublayer-row';
        state.phases.forEach(phase => {
          const cell = makeCellEl(layer.id, sl.id, phase.id, true);
          slRow.appendChild(cell);
        });
        sublayerContainer.appendChild(slRow);
      });
      body.appendChild(sublayerContainer);
    } else {
      // Normal layer cells
      state.phases.forEach(phase => {
        const cell = makeCellEl(layer.id, '', phase.id, false);
        body.appendChild(cell);
      });
    }

    row.appendChild(body);
    canvas.appendChild(row);
  });

  // Re-apply mode
  if (state.mode === 'presentation') {
    document.body.classList.add('presentation');
  }
}

function makeCellEl(layerId, sublayerId, phaseId, isSublayer) {
  const key = makeKey(layerId, sublayerId, phaseId);
  const nodes = state.cells[key] || [];
  const cell = document.createElement('div');
  cell.className = 'cell' + (isSublayer ? ' sublayer-cell' : '');
  cell.dataset.key = key;

  nodes.forEach(node => {
    cell.appendChild(makeNodeEl(node, key));
  });

  // Add btn
  const addBtn = document.createElement('div');
  addBtn.className = 'cell-add';
  addBtn.textContent = '+';
  addBtn.title = 'Agregar nodo';
  addBtn.onclick = (e) => { e.stopPropagation(); openNewNode(key); };
  cell.appendChild(addBtn);

  return cell;
}

function makeNodeEl(node, cellKey) {
  const status = STATUSES.find(s => s.id === node.status) || STATUSES[5];
  const el = document.createElement('div');
  el.className = `node ${status.cls}`;
  el.dataset.nodeId = node.id;
  el.dataset.cellKey = cellKey;

  const typeIcon = node.type === 'touchpoint' ? '◎' : '⚡';
  const typeCls  = node.type === 'touchpoint' ? 'type-touchpoint' : 'type-action';
  const typeLabel= node.type === 'touchpoint' ? 'Touchpoint' : 'Acción';

  const flagsHtml = (node.flags||[]).map(fid => {
    const f = FLAGS.find(x=>x.id===fid);
    return f ? `<span class="flag" title="${f.label}">${f.emoji}</span>` : '';
  }).join('');

  el.innerHTML = `
    <div class="node-status-bar"></div>
    <div class="node-top">
      <span class="node-type-icon">${typeIcon}</span>
      <div class="node-title">${node.title || 'Sin título'}</div>
    </div>
    <div class="node-badges">
      <span class="badge ${typeCls}">${typeLabel}</span>
      ${node.actor ? `<span class="badge" style="background:rgba(136,146,176,.2);color:var(--text2)">${node.actor}</span>` : ''}
    </div>
    ${flagsHtml ? `<div class="node-flags">${flagsHtml}</div>` : ''}
  `;

  el.onclick = (e) => { e.stopPropagation(); openEditNode(cellKey, node.id); };
  return el;
}

// ══════════════════════════════════════════════════
//  LAYER TOGGLE
// ══════════════════════════════════════════════════
function toggleLayer(layerId) {
  const layer = state.layers.find(l => l.id === layerId);
  if (layer) {
    layer.collapsed = !layer.collapsed;
    saveState();
    render();
  }
}

// ══════════════════════════════════════════════════
//  PANEL LOGIC
// ══════════════════════════════════════════════════
let currentCellKey = null;
let currentNodeId  = null;
let isNewNode      = false;

function openNewNode(cellKey) {
  currentCellKey = cellKey;
  currentNodeId  = null;
  isNewNode      = true;
  resetPanel();
  document.getElementById('panel-title').textContent = 'Nuevo Nodo';
  openPanel();
}

function openEditNode(cellKey, nodeId) {
  if (state.mode === 'presentation') return;
  currentCellKey = cellKey;
  currentNodeId  = nodeId;
  isNewNode      = false;
  const nodes = state.cells[cellKey] || [];
  const node  = nodes.find(n => n.id === nodeId);
  if (!node) return;
  document.getElementById('panel-title').textContent = 'Editar Nodo';
  document.getElementById('f-title').value  = node.title  || '';
  document.getElementById('f-actor').value  = node.actor  || '';
  document.getElementById('f-desc').value   = node.desc   || '';
  document.getElementById('f-notes').value  = node.notes  || '';
  setType(node.type || 'action', false);
  renderStatusGrid(node.status || 'notstarted');
  renderFlagGrid(node.flags || []);
  openPanel();
}

function resetPanel() {
  document.getElementById('f-title').value  = '';
  document.getElementById('f-actor').value  = '';
  document.getElementById('f-desc').value   = '';
  document.getElementById('f-notes').value  = '';
  setType('action', false);
  renderStatusGrid('notstarted');
  renderFlagGrid([]);
}

function openPanel() {
  document.getElementById('side-panel').classList.remove('closed');
}
function closePanel() {
  document.getElementById('side-panel').classList.add('closed');
  currentCellKey = null; currentNodeId = null;
}

let _currentType   = 'action';
let _currentStatus = 'notstarted';
let _currentFlags  = [];

function setType(t, save=true) {
  _currentType = t;
  document.getElementById('t-action').className     = 'type-btn' + (t==='action'     ? ' active-action'     : '');
  document.getElementById('t-touchpoint').className = 'type-btn' + (t==='touchpoint' ? ' active-touchpoint' : '');
}

function renderStatusGrid(selected) {
  _currentStatus = selected;
  const grid = document.getElementById('status-grid');
  grid.innerHTML = '';
  STATUSES.forEach(s => {
    const div = document.createElement('div');
    div.className = 'status-opt' + (s.id === selected ? ' selected' : '');
    div.style.borderColor = s.color;
    div.style.color = s.color;
    if (s.id === selected) div.style.background = s.color + '22';
    div.textContent = s.label;
    div.onclick = () => renderStatusGrid(s.id);
    grid.appendChild(div);
  });
}

function renderFlagGrid(selected) {
  _currentFlags = [...selected];
  const grid = document.getElementById('flag-grid');
  grid.innerHTML = '';
  FLAGS.forEach(f => {
    const btn = document.createElement('div');
    btn.className = 'flag-btn' + (_currentFlags.includes(f.id) ? ' active' : '');
    btn.textContent = f.emoji + ' ' + f.label;
    btn.onclick = () => {
      if (_currentFlags.includes(f.id)) _currentFlags = _currentFlags.filter(x=>x!==f.id);
      else _currentFlags.push(f.id);
      renderFlagGrid(_currentFlags);
    };
    grid.appendChild(btn);
  });
}

function saveNode() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').style.borderColor='var(--red)'; return; }
  document.getElementById('f-title').style.borderColor='';

  const nodeData = {
    title, type:_currentType,
    actor: document.getElementById('f-actor').value.trim(),
    desc:  document.getElementById('f-desc').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    status: _currentStatus,
    flags:  [..._currentFlags],
  };

  if (!state.cells[currentCellKey]) state.cells[currentCellKey] = [];

  if (isNewNode) {
    nodeData.id = uid();
    state.cells[currentCellKey].push(nodeData);
  } else {
    const idx = state.cells[currentCellKey].findIndex(n=>n.id===currentNodeId);
    if (idx >= 0) { nodeData.id = currentNodeId; state.cells[currentCellKey][idx] = nodeData; }
  }

  saveState();
  render();
  closePanel();
}

function deleteNode() {
  if (!currentCellKey || !currentNodeId) return;
  if (!confirm('¿Eliminar este nodo?')) return;
  state.cells[currentCellKey] = (state.cells[currentCellKey]||[]).filter(n=>n.id!==currentNodeId);
  saveState(); render(); closePanel();
}

// ══════════════════════════════════════════════════
//  PHASE MODAL
// ══════════════════════════════════════════════════
let modalMode = 'add';
let editPhaseId = null;

function renderModalColors(selected) {
  const cont = document.getElementById('modal-colors');
  cont.innerHTML = '';
  PHASE_COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.style.cssText = `width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${c===selected?'#fff':'transparent'};transition:all .15s`;
    sw.title = c;
    sw.onclick = () => { _modalColor = c; renderModalColors(c); };
    cont.appendChild(sw);
  });
}

let _modalColor = PHASE_COLORS[0];

function openAddPhase() {
  modalMode = 'add';
  _modalColor = PHASE_COLORS[0];
  document.getElementById('modal-title').textContent = 'Nueva Fase';
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-icon').value = '📌';
  document.getElementById('modal-confirm').textContent = 'Crear';
  renderModalColors(_modalColor);
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditPhase(phaseId) {
  modalMode = 'edit';
  editPhaseId = phaseId;
  const phase = state.phases.find(p=>p.id===phaseId);
  if (!phase) return;
  _modalColor = phase.color;
  document.getElementById('modal-title').textContent = 'Editar Fase';
  document.getElementById('modal-name').value = phase.name;
  document.getElementById('modal-icon').value = phase.icon;
  document.getElementById('modal-confirm').textContent = 'Guardar';
  renderModalColors(_modalColor);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function confirmModal() {
  const name = document.getElementById('modal-name').value.trim();
  const icon = document.getElementById('modal-icon').value.trim() || '📌';
  if (!name) return;
  if (modalMode === 'add') {
    const n = state.phases.length + 1;
    state.phases.push({ id:'p'+uid(), icon, name, color:_modalColor, label:`Fase ${n}` });
  } else {
    const phase = state.phases.find(p=>p.id===editPhaseId);
    if (phase) { phase.name = name; phase.icon = icon; phase.color = _modalColor; }
  }
  saveState(); render(); closeModal();
}

// ══════════════════════════════════════════════════
//  MODE SWITCH
// ══════════════════════════════════════════════════
function setMode(mode) {
  state.mode = mode;
  if (mode === 'presentation') {
    document.body.classList.add('presentation');
    document.getElementById('btn-work').classList.remove('active');
    document.getElementById('btn-pres').classList.add('active');
    document.getElementById('btn-pres2').style.display = 'flex';
    closePanel();
  } else {
    document.body.classList.remove('presentation');
    document.getElementById('btn-work').classList.add('active');
    document.getElementById('btn-pres').classList.remove('active');
    document.getElementById('btn-pres2').style.display = 'none';
  }
  saveState();
}

// ══════════════════════════════════════════════════
function exportData() {
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `blueprint_oncologico_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (imported.phases && imported.layers) {
          state = imported;
          saveState(); render();
        } else { alert('Archivo no válido.'); }
      } catch(err) { alert('Error al leer el archivo.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Close modal on overlay click
document.getElementById('modal-overlay').onclick = function(e) {
  if (e.target === this) closeModal();
};

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
loadState();
render();
</script>
</body>
