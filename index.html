<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Blueprint Navegadores en Red — Oncológico HPM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pw:260px;--lw:160px;--ch:90px;--sh:72px;--hh:46px;--panw:370px;--acc:#185FA5;--grn:#3B6D11;--amb:#854F0B;--red:#A32D2D;--pur:#534AB7;--tel:#0F6E56}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e8eaf6;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}
#tb{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:46px;background:#1a1d27;border-bottom:1px solid #2e3350;flex-shrink:0;gap:10px}
.logo{font-size:13px;font-weight:600;color:#e8eaf6;white-space:nowrap;display:flex;align-items:center;gap:7px}
.logo-s{font-size:11px;color:#8892b0;font-weight:400}
.tctrls{display:flex;gap:5px;align-items:center}
.btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;border:1px solid #2e3350;background:transparent;color:#8892b0;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .1s}
.btn:hover{background:#22263a}
.btn.act{background:var(--acc);color:#fff;border-color:var(--acc)}
.mw{display:flex;border:1px solid #2e3350;border-radius:6px;overflow:hidden}
.mw .btn{border:none;border-radius:0}
#main{display:flex;flex:1;overflow:hidden}
#sa{flex:1;overflow:auto}
#cv{display:inline-flex;flex-direction:column;min-width:100%}
#ph-row{display:flex;position:sticky;top:0;z-index:50;background:#0f1117;border-bottom:1px solid #2e3350}
.corner{width:var(--lw);min-width:var(--lw);height:var(--hh);background:#1a1d27;border-right:1px solid #2e3350;display:flex;align-items:center;justify-content:center;font-size:9px;color:#636e72;letter-spacing:.5px;text-transform:uppercase;position:sticky;left:0;z-index:60;flex-shrink:0}
.ph{width:var(--pw);min-width:var(--pw);height:var(--hh);display:flex;align-items:center;gap:7px;padding:0 12px;border-right:1px solid #22263a;border-top:3px solid transparent;cursor:pointer;flex-shrink:0;transition:background .1s}
.ph:hover{background:#1a1d27}
.ph-n{font-size:9px;color:#636e72;text-transform:uppercase;letter-spacing:.5px}
.ph-t{font-size:12px;font-weight:600;color:#e8eaf6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ph-ic{font-size:14px;flex-shrink:0}
.ph-add{width:40px;min-width:40px;height:var(--hh);display:flex;align-items:center;justify-content:center;color:#636e72;cursor:pointer;border-left:1px dashed #2e3350;font-size:18px;transition:color .1s}
.ph-add:hover{color:var(--acc)}
body.pres .ph-add{display:none}
.lr{display:flex;border-bottom:1px solid #2e3350}
.lr.col .lb-body{display:none}
.ll{width:var(--lw);min-width:var(--lw);background:#1a1d27;border-right:1px solid #2e3350;position:sticky;left:0;z-index:30;display:flex;flex-direction:column;flex-shrink:0}
.llm{display:flex;align-items:center;gap:6px;padding:7px 9px;cursor:pointer;min-height:var(--ch);transition:background .1s}
.llm:hover{background:#22263a}
.ln{font-size:11px;font-weight:600;line-height:1.3;flex:1;min-width:0}
.ls{font-size:9px;color:#636e72;margin-top:1px}
.lch{font-size:9px;color:#636e72;transition:transform .15s;flex-shrink:0}
.lr.col .lch{transform:rotate(-90deg)}
.sll{display:flex;align-items:center;gap:5px;padding:5px 9px 5px 18px;border-top:1px solid #2e3350;min-height:var(--sh);background:#1a1d27}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sn{font-size:10px;color:#8892b0;font-weight:500;line-height:1.3}
.lb-body{display:flex;flex:1}
.sr-wrap{display:flex;flex-direction:column;width:100%}
.sr{display:flex;border-top:1px solid #2e3350}
.cell{width:var(--pw);min-width:var(--pw);min-height:var(--ch);border-right:1px solid #22263a;padding:5px;display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start;flex-shrink:0}
.cell.sc{min-height:var(--sh)}
.ca{width:22px;height:22px;border:1px dashed #2e3350;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#636e72;cursor:pointer;font-size:14px;transition:all .1s;flex-shrink:0;align-self:flex-start}
.ca:hover{border-color:var(--acc);color:var(--acc);background:rgba(24,95,165,.15)}
body.pres .ca{display:none!important}
.node{position:relative;border-radius:7px;border:1.5px solid;padding:5px 6px;cursor:pointer;transition:all .1s;max-width:190px;min-width:68px;background:#1a1d27}
.node:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.4)}
body.pres .node{cursor:default}
body.pres .node:hover{transform:none;box-shadow:none}
.nb{position:absolute;top:0;left:0;right:0;height:2px;border-radius:6px 6px 0 0}
.nt{display:flex;align-items:flex-start;gap:3px;margin-bottom:3px}
.ni{font-size:10px;flex-shrink:0;margin-top:1px}
.ntx{font-size:11px;font-weight:600;line-height:1.3;flex:1;color:#e8eaf6}
.nbd{display:flex;gap:2px;flex-wrap:wrap}
.bg{font-size:9px;padding:1px 4px;border-radius:8px;font-weight:600}
.ba{background:rgba(24,95,165,.2);color:#85B7EB}
.bt{background:rgba(83,74,183,.2);color:#AFA9EC}
.bac{background:rgba(136,146,176,.15);color:#8892b0}
.nf{display:flex;gap:2px;margin-top:2px;font-size:11px}
.si{border-color:var(--grn)}.si .nb{background:var(--grn)}
.sp{border-color:var(--acc)}.sp .nb{background:var(--acc)}
.sd2{border-color:#636e72}.sd2 .nb{background:#636e72}
.sb{border-color:var(--red)}.sb .nb{background:var(--red)}
.sg{border-color:var(--amb)}.sg .nb{background:var(--amb)}
.sn2{border-color:#2e3350;opacity:.75}.sn2 .nb{background:#2e3350}
#pan{width:var(--panw);background:#1a1d27;border-left:1px solid #2e3350;display:flex;flex-direction:column;flex-shrink:0;transition:width .18s;overflow:hidden}
#pan.cl{width:0;border:none}
body.pres #pan{width:0!important;border:none!important}
#pan-h{padding:11px 14px 9px;border-bottom:1px solid #2e3350;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#pan-ti{font-size:13px;font-weight:600}
#pan-x{width:24px;height:24px;border-radius:5px;background:#22263a;border:1px solid #2e3350;color:#8892b0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .1s}
#pan-x:hover{background:var(--red);color:#fff;border-color:var(--red)}
#pan-b{flex:1;overflow-y:auto;padding:12px 14px}
.fl{margin-bottom:12px}
.fl label{display:block;font-size:9px;font-weight:700;color:#636e72;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.fl input,.fl textarea,.fl select{width:100%;background:#22263a;border:1px solid #2e3350;color:#e8eaf6;border-radius:5px;padding:6px 8px;font-size:12px;font-family:inherit;resize:vertical;transition:border-color .1s}
.fl input:focus,.fl textarea:focus{outline:none;border-color:var(--acc)}
.fl textarea{min-height:58px}
.tr{display:flex;gap:5px}
.tb{flex:1;padding:5px;border-radius:5px;border:1px solid #2e3350;font-size:11px;font-weight:600;cursor:pointer;text-align:center;background:#22263a;color:#8892b0;transition:all .1s;font-family:inherit}
.tb.ta{border-color:var(--acc);color:#85B7EB;background:rgba(24,95,165,.15)}
.tb.tt{border-color:var(--pur);color:#AFA9EC;background:rgba(83,74,183,.15)}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.so{padding:5px;border-radius:5px;border:1px solid #2e3350;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .1s;font-family:inherit;background:transparent;color:#8892b0}
.fr{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:3px 8px;border-radius:14px;border:1px solid #2e3350;font-size:11px;cursor:pointer;background:#22263a;color:#8892b0;transition:all .1s;font-family:inherit}
.fb.on{border-color:var(--acc);background:rgba(24,95,165,.2);color:#85B7EB}
#pan-f{padding:9px 14px;border-top:1px solid #2e3350;display:flex;gap:5px;flex-shrink:0}
#bsv{flex:1;padding:7px;border-radius:5px;border:none;background:var(--acc);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
#bdl{padding:7px 11px;border-radius:5px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:12px;cursor:pointer;font-family:inherit;transition:all .1s}
#bdl:hover{background:var(--red);color:#fff}
#leg{padding:5px 14px;background:#1a1d27;border-top:1px solid #2e3350;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
.li{display:flex;align-items:center;gap:3px;font-size:10px;color:#8892b0}
.ld{width:7px;height:7px;border-radius:2px;flex-shrink:0}
#mb{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:200}
#mb.op{display:flex}
#md{background:#1a1d27;border:1px solid #2e3350;border-radius:10px;padding:18px;width:340px;max-width:92vw}
#md h3{font-size:13px;font-weight:600;margin-bottom:12px}
.mf{display:flex;gap:5px;margin-top:12px}
.mf .btn{flex:1;padding:7px;justify-content:center;font-size:12px}
.cs{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s;flex-shrink:0}
.cr{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
</style>
</head>
<body>
<div id="tb">
  <div class="logo">⬡ Blueprint Navegadores en Red <span class="logo-s">Oncológico · HPM / SSDR</span></div>
  <div class="tctrls">
    <div class="mw">
      <button class="btn act" id="bw" onclick="setMode('work')">⚙ Trabajo</button>
      <button class="btn" id="bp2" onclick="setMode('pres')">▶ Presentación</button>
    </div>
    <button class="btn" onclick="openAdd()">+ Fase</button>
    <button class="btn" onclick="doExp()">↓ Exportar</button>
    <button class="btn" onclick="doImp()">↑ Importar</button>
  </div>
</div>
<div id="main">
  <div id="sa"><div id="cv"></div></div>
  <div id="pan" class="cl">
    <div id="pan-h"><div id="pan-ti">Nodo</div><button id="pan-x" onclick="closeP()">✕</button></div>
    <div id="pan-b">
      <div class="fl"><label>Título</label><input id="fti" placeholder="Nombre del nodo"></div>
      <div class="fl"><label>Tipo</label><div class="tr"><button class="tb ta" id="ta" onclick="setT('action')">⚡ Acción</button><button class="tb" id="tt" onclick="setT('touch')">◎ Touchpoint</button></div></div>
      <div class="fl"><label>Actor responsable</label><input id="fac" placeholder="Ej: Navegador, GCO, Médico..."></div>
      <div class="fl"><label>Descripción</label><textarea id="fde" placeholder="Describe la acción o punto de contacto..."></textarea></div>
      <div class="fl"><label>Estado</label><div class="sg2" id="stg"></div></div>
      <div class="fl"><label>Marcadores</label><div class="fr" id="flg"></div></div>
      <div class="fl"><label>Notas / Brechas</label><textarea id="fno" placeholder="Observaciones, oportunidades, alertas..."></textarea></div>
    </div>
    <div id="pan-f"><button id="bsv" onclick="saveN()">Guardar</button><button id="bdl" onclick="delN()">Eliminar</button></div>
  </div>
</div>
<div id="leg">
  <span style="font-size:9px;font-weight:700;color:#636e72;text-transform:uppercase;letter-spacing:.5px">Estado:</span>
  <div class="li"><div class="ld" style="background:#3B6D11"></div>Implementado</div>
  <div class="li"><div class="ld" style="background:#185FA5"></div>En proceso</div>
  <div class="li"><div class="ld" style="background:#636e72"></div>Diseñado</div>
  <div class="li"><div class="ld" style="background:#A32D2D"></div>Problema</div>
  <div class="li"><div class="ld" style="background:#854F0B"></div>Buena práctica</div>
  <div class="li"><div class="ld" style="background:#2e3350"></div>No iniciado</div>
  <span style="font-size:9px;font-weight:700;color:#636e72;text-transform:uppercase;letter-spacing:.5px;margin-left:8px">Tipo:</span>
  <div class="li">⚡ Acción</div><div class="li">◎ Touchpoint</div>
  <div class="li">🚩 Red flag</div><div class="li">⭐ BP</div><div class="li">⚠️ Alerta</div><div class="li">🔗 Vinculación</div>
</div>
<div id="mb"><div id="md">
  <h3 id="mti">Nueva fase</h3>
  <div class="fl"><label>Nombre</label><input id="mn" placeholder="Ej: Comité oncológico"></div>
  <div class="fl"><label>Ícono</label><input id="mi" placeholder="🔬" style="font-size:15px"></div>
  <div class="fl"><label>Color</label><div class="cr" id="mc"></div></div>
  <div class="mf"><button class="btn" onclick="closeMd()">Cancelar</button><button class="btn act" id="mok" onclick="okMd()">Crear</button></div>
</div></div>
<script>
const ST=[
  {id:'si',l:'Implementado',c:'#3B6D11',cl:'si'},
  {id:'sp',l:'En proceso',c:'#185FA5',cl:'sp'},
  {id:'sd',l:'Diseñado',c:'#636e72',cl:'sd2'},
  {id:'sb',l:'Problema',c:'#A32D2D',cl:'sb'},
  {id:'sg',l:'Buena práctica',c:'#854F0B',cl:'sg'},
  {id:'sn',l:'No iniciado',c:'#2e3350',cl:'sn2'},
];
const FL=[
  {id:'rf',e:'🚩',l:'Red flag'},{id:'bp',e:'⭐',l:'Buena práctica'},
  {id:'al',e:'⚠️',l:'Alerta'},{id:'lk',e:'🔗',l:'Vinculación'},
  {id:'pe',e:'⏳',l:'Pendiente'},{id:'ke',e:'🔑',l:'Clave'},
];
const COLS=['#185FA5','#3B6D11','#854F0B','#A32D2D','#534AB7','#0F6E56','#BA7517'];
const DP=[
  {id:'p1',ic:'🚪',nm:'Entrada al sistema',c:'#185FA5',lb:'Fase 1'},
  {id:'p2',ic:'🔍',nm:'Detección / Sospecha',c:'#854F0B',lb:'Fase 2'},
  {id:'p3',ic:'🏥',nm:'Interconsulta a HPM',c:'#534AB7',lb:'Fase 3'},
  {id:'p4',ic:'👨‍⚕️',nm:'Hora especialista',c:'#0F6E56',lb:'Fase 4'},
  {id:'p5',ic:'🧬',nm:'Confirmación diagnóstica',c:'#A32D2D',lb:'Fase 5'},
  {id:'p6',ic:'🏛️',nm:'Comité oncológico',c:'#BA7517',lb:'Fase 6'},
  {id:'p7',ic:'💊',nm:'Plan terapéutico',c:'#3B6D11',lb:'Fase 7'},
  {id:'p8',ic:'🤝',nm:'Seguimiento y alta',c:'#185FA5',lb:'Fase 8'},
];
const DL=[
  {id:'lp',ic:'👤',nm:'Ruta del paciente',sb:'2 perfiles',c:'#185FA5',col:false,subs:[
    {id:'lp1',nm:'Paciente GES oncológico',c:'#A32D2D'},
    {id:'lp2',nm:'Paciente no GES (cirugía / CE)',c:'#854F0B'},
  ]},
  {id:'lf',ic:'🩺',nm:'Frontstage clínico',sb:'Actos visibles al paciente',c:'#0F6E56',col:false,subs:[]},
  {id:'la',ic:'📋',nm:'Gestores oncológicos (GCO)',sb:'Coordinación y derivación',c:'#534AB7',col:false,subs:[]},
  {id:'ln',ic:'🧭',nm:'Navegadores en Red',sb:'Acompañamiento y trayectoria',c:'#3B6D11',col:false,subs:[]},
  {id:'lb',ic:'⚙️',nm:'Backstage administrativo',sb:'Operaciones internas',c:'#636e72',col:false,subs:[]},
  {id:'lt',ic:'💻',nm:'Sistemas y tecnología',sb:'Plataformas y registros',c:'#854F0B',col:false,subs:[]},
];
function uid(){return Math.random().toString(36).slice(2,9)}
function k(l,s,p){return l+'|'+(s||'')+'|'+p}
let S={phases:[],layers:[],cells:{},mode:'work'};
function loadS(){
  try{const x=localStorage.getItem('nb_v3');if(x){S=JSON.parse(x);return}}catch(e){}
  S.phases=JSON.parse(JSON.stringify(DP));
  S.layers=JSON.parse(JSON.stringify(DL));
  S.cells={};seed();
}
function saveS(){try{localStorage.setItem('nb_v3',JSON.stringify(S))}catch(e){}}
function an(l,s,p,d){const x=k(l,s,p);if(!S.cells[x])S.cells[x]=[];S.cells[x].push({id:uid(),...d})}
function seed(){
  an('lp','lp1','p1',{title:'Ingresa por APS',type:'touch',actor:'Médico general / CESFAM',status:'si',flags:['ke'],desc:'Paciente con sospecha oncológica evaluado en APS. Médico elabora IC a HPM.',notes:''});
  an('lp','lp1','p1',{title:'Ingresa por urgencias',type:'touch',actor:'SU HPM',status:'si',flags:[],desc:'Cuadro agudo con sospecha oncológica detectada en urgencias.',notes:''});
  an('lp','lp1','p1',{title:'Hospitalizado HPM',type:'touch',actor:'Equipo tratante',status:'si',flags:[],desc:'Sospecha detectada durante hospitalización por otra causa.',notes:''});
  an('lp','lp2','p1',{title:'Ambulatorio / CE',type:'touch',actor:'Especialista',status:'si',flags:[],desc:'Detección en consulta de especialidad.',notes:''});
  an('lp','lp2','p1',{title:'Extrasistema',type:'action',actor:'Paciente / Familia',status:'sd',flags:['al'],desc:'Paciente desde sistema privado u otra red. Requiere validación y reingreso.',notes:'Barrera: documentación y tiempos de reingreso.'});
  an('lp','lp2','p1',{title:'Macrorred / derivación',type:'action',actor:'SSDR / MINSAL',status:'sd',flags:['lk'],desc:'Derivación desde otro servicio de salud o establecimiento de la macrorred.',notes:''});
  an('lp','lp1','p2',{title:'Sospecha GES activada',type:'touch',actor:'Médico / Equipo',status:'si',flags:['ke'],desc:'Código GES activado. Paciente entra a protocolo de garantías explícitas oncológicas.',notes:''});
  an('lp','lp2','p2',{title:'Sospecha no GES',type:'touch',actor:'Médico / Especialista',status:'si',flags:['al'],desc:'Sin código GES. Entra a lista de espera no GES. Sin garantía de plazo.',notes:'Mayor vulnerabilidad: sin garantía de plazo.'});
  an('lf','','p2',{title:'Equipo oncológico identifica sospecha',type:'action',actor:'Equipo clínico HPM',status:'si',flags:[],desc:'Revisión de antecedentes, imágenes y laboratorio.',notes:''});
  an('la','','p2',{title:'GCO registra caso',type:'action',actor:'Gestor oncológico',status:'sp',flags:['al'],desc:'GCO ingresa caso al sistema de seguimiento y asigna prioridad.',notes:'Brecha: subregistro histórico en HPM.'});
  an('lp','lp1','p3',{title:'IC recibida en HPM',type:'touch',actor:'APS / SU / CE',status:'si',flags:[],desc:'IC llega a HPM. Tiempo GES comienza a contar.',notes:''});
  an('lf','','p3',{title:'Revisión IC por especialista',type:'action',actor:'Oncólogo / Especialista',status:'si',flags:[],desc:'Especialista revisa IC, determina urgencia y prioridad.',notes:''});
  an('ln','','p3',{title:'Navegador vincula paciente',type:'touch',actor:'Navegador en Red',status:'sp',flags:['ke','lk'],desc:'Navegador contacta al paciente: informa proceso, identifica barreras, prepara cita.',notes:'Llamada pre-consulta: script estructurado.'});
  an('la','','p3',{title:'GCO coordina agenda',type:'action',actor:'Gestor oncológico',status:'sp',flags:[],desc:'GCO coordina agenda dentro del plazo GES.',notes:''});
  an('lp','lp1','p4',{title:'Hora especialista HPM',type:'touch',actor:'Oncólogo / Especialista',status:'si',flags:['ke'],desc:'Primera consulta. Evaluación clínica y definición de plan de estudio.',notes:''});
  an('lf','','p4',{title:'Evaluación y solicitud exámenes',type:'action',actor:'Especialista',status:'si',flags:[],desc:'Solicitud de imágenes, biopsia, laboratorio según protocolo.',notes:''});
  an('ln','','p4',{title:'Acompañamiento pre-consulta',type:'touch',actor:'Navegador en Red',status:'sp',flags:['bp'],desc:'Navegador verifica asistencia, apoya traslado, entrega información.',notes:'Buena práctica: reducción de NSP en oncología.'});
  an('la','','p4',{title:'Ventanilla GES / admisión',type:'action',actor:'Ventanilla / GCO',status:'si',flags:[],desc:'Admisión del paciente. Entrega información clínica y administrativa.',notes:''});
  an('lp','lp1','p5',{title:'Exámenes realizados',type:'touch',actor:'Paciente',status:'si',flags:[],desc:'Paciente realiza exámenes: imágenes, biopsia, laboratorio.',notes:''});
  an('lp','lp2','p5',{title:'Resultado: confirma / descarta',type:'touch',actor:'Especialista',status:'si',flags:['ke'],desc:'Con biopsia u otros exámenes se confirma o descarta diagnóstico.',notes:'Momento de alto impacto emocional.'});
  an('lf','','p5',{title:'Entrega de diagnóstico',type:'touch',actor:'Médico tratante',status:'si',flags:['al'],desc:'Comunicación del diagnóstico al paciente y familiar.',notes:''});
  an('ln','','p5',{title:'Llamada post-resultado',type:'touch',actor:'Navegador en Red',status:'sd',flags:['ke'],desc:'Contención emocional y preparación para comité.',notes:''});
  an('lt','','p5',{title:'Registro plataforma oncológica',type:'action',actor:'GCO / Hospital',status:'sb',flags:['rf'],desc:'Registro en plataforma de seguimiento oncológico MINSAL.',notes:'Brecha crítica: subregistro histórico en HPM.'});
  an('lf','','p6',{title:'Presentación comité ONCO',type:'action',actor:'Equipo clínico',status:'si',flags:['ke'],desc:'Caso presentado a comité multidisciplinario. Decisión colectiva del plan terapéutico.',notes:''});
  an('lp','lp1','p6',{title:'Comité: acepta / rechaza / deriva',type:'touch',actor:'Comité ONCO',status:'si',flags:[],desc:'Tres resultados: aprobación del plan, rechazo o derivación.',notes:''});
  an('la','','p6',{title:'GCO gestiona resultado comité',type:'action',actor:'Gestor oncológico',status:'sp',flags:['lk'],desc:'GCO coordina agendamiento, derivación o cierre.',notes:''});
  an('ln','','p6',{title:'Navegador informa a paciente',type:'touch',actor:'Navegador en Red',status:'sd',flags:['ke'],desc:'Navegador informa decisión del comité y próximos pasos.',notes:''});
  an('lp','lp1','p7',{title:'QMT — quimioterapia',type:'action',actor:'Oncólogo médico',status:'sd',flags:[],desc:'Inicio de quimioterapia según protocolo. Múltiples ciclos con controles intercalados.',notes:''});
  an('lp','lp1','p7',{title:'RDT — radioterapia',type:'action',actor:'Oncólogo radioterapeuta',status:'sd',flags:['al'],desc:'Inicio de radioterapia. Planificación, simulación y tratamiento.',notes:'Disponibilidad limitada en HPM. Puede requerir derivación.'});
  an('lp','lp1','p7',{title:'CX — cirugía oncológica',type:'action',actor:'Cirujano oncólogo',status:'sd',flags:['al'],desc:'Intervención quirúrgica. Tiempos variables según complejidad.',notes:'Brecha: tiempos quirúrgicos fuera de garantía GES.'});
  an('lp','lp2','p7',{title:'CCPP — cuidados paliativos',type:'action',actor:'Equipo CCPP',status:'sd',flags:['ke'],desc:'Ingreso a programa de cuidados paliativos.',notes:'Incluye coordinación con APS para seguimiento domiciliario.'});
  an('lp','lp2','p7',{title:'QMT + RDT — combinado',type:'action',actor:'Equipo oncológico',status:'sd',flags:[],desc:'Protocolo combinado de quimioterapia y radioterapia.',notes:''});
  an('ln','','p7',{title:'Navegador acompaña inicio tto.',type:'touch',actor:'Navegador en Red',status:'sd',flags:['ke','bp'],desc:'Verifica comprensión del plan, apoya logística y contención.',notes:'Rol central NAV: articulador entre lo clínico y la vivencia.'});
  an('la','','p7',{title:'GCO coordina tratamiento',type:'action',actor:'Gestor oncológico',status:'sp',flags:[],desc:'GCO gestiona agendas y asegura continuidad.',notes:''});
  an('lp','lp1','p8',{title:'Control post-tratamiento',type:'touch',actor:'Especialista',status:'sd',flags:[],desc:'Controles de seguimiento. Evaluación de respuesta al tratamiento.',notes:''});
  an('lp','lp2','p8',{title:'Alta terapéutica / fallecimiento',type:'touch',actor:'Equipo clínico',status:'sd',flags:['al'],desc:'Cierre del caso: alta terapéutica o fallecimiento registrado.',notes:''});
  an('ln','','p8',{title:'Llamada seguimiento NAV',type:'touch',actor:'Navegador en Red',status:'sd',flags:['ke','bp'],desc:'Llamada post-atención: adherencia, barreras, evolución.',notes:'Protocolo NAV: llamada post-tratamiento.'});
  an('lb','','p8',{title:'Reporte semanal MINSAL',type:'action',actor:'UGT / Paulo',status:'si',flags:['ke'],desc:'Envío viernes del consolidado al MINSAL. Template Plan Alerta Oncológica.',notes:''});
  an('lp','lp1','p8',{title:'Retorno a APS',type:'touch',actor:'Médico APS',status:'sd',flags:['lk'],desc:'Alta terapéutica derivada a APS para seguimiento en nivel primario.',notes:''});
}
function render(){
  const cv=document.getElementById('cv');cv.innerHTML='';
  const hr=document.createElement('div');hr.id='ph-row';
  const co=document.createElement('div');co.className='corner';co.textContent='Capas / Fases →';hr.appendChild(co);
  S.phases.forEach(p=>{
    const d=document.createElement('div');d.className='ph';d.style.borderTopColor=p.c;
    d.innerHTML=`<span class="ph-ic">${p.ic}</span><div><div class="ph-n">${p.lb}</div><div class="ph-t">${p.nm}</div></div>`;
    d.ondblclick=()=>openEdit2(p.id);hr.appendChild(d);
  });
  const ap=document.createElement('div');ap.className='ph-add';ap.innerHTML='+';ap.title='Agregar fase';ap.onclick=()=>openAdd();hr.appendChild(ap);
  cv.appendChild(hr);
  S.layers.forEach(lr=>{
    const row=document.createElement('div');row.className='lr'+(lr.col?' col':'');row.id='r'+lr.id;
    const ll=document.createElement('div');ll.className='ll';
    const lm=document.createElement('div');lm.className='llm';
    lm.innerHTML=`<span style="font-size:15px;flex-shrink:0">${lr.ic}</span><div class="ln" style="color:${lr.c}">${lr.nm}<div class="ls">${lr.sb}</div></div><span class="lch">▼</span>`;
    lm.onclick=()=>togL(lr.id);ll.appendChild(lm);
    if(lr.subs&&lr.subs.length){lr.subs.forEach(sl=>{const sd=document.createElement('div');sd.className='sll';sd.innerHTML=`<div class="sd" style="background:${sl.c}"></div><div class="sn">${sl.nm}</div>`;ll.appendChild(sd);})}
    row.appendChild(ll);
    const body=document.createElement('div');body.className='lb-body';
    if(lr.subs&&lr.subs.length){
      const sr=document.createElement('div');sr.className='sr-wrap';
      lr.subs.forEach(sl=>{const r=document.createElement('div');r.className='sr';S.phases.forEach(p=>{r.appendChild(mCell(lr.id,sl.id,p.id,true));});sr.appendChild(r);});
      body.appendChild(sr);
    } else {S.phases.forEach(p=>{body.appendChild(mCell(lr.id,'',p.id,false));});}
    row.appendChild(body);cv.appendChild(row);
  });
}
function mCell(l,s,p,sub){
  const ck=k(l,s,p);const nodes=S.cells[ck]||[];
  const c=document.createElement('div');c.className='cell'+(sub?' sc':'');c.dataset.k=ck;
  nodes.forEach(n=>c.appendChild(mNode(n,ck)));
  const ab=document.createElement('div');ab.className='ca';ab.innerHTML='+';ab.title='Agregar nodo';ab.onclick=e=>{e.stopPropagation();openNew(ck)};
  c.appendChild(ab);return c;
}
function mNode(n,ck){
  const st=ST.find(s=>s.id===n.status)||ST[5];
  const el=document.createElement('div');el.className=`node ${st.cl}`;el.dataset.nid=n.id;el.dataset.k=ck;
  const ti=n.type==='touch'?'◎':'⚡';
  const tb=n.type==='touch'?'bg bt':'bg ba';const tl=n.type==='touch'?'Touchpoint':'Acción';
  const fl=(n.flags||[]).map(f=>{const x=FL.find(v=>v.id===f);return x?`<span title="${x.l}">${x.e}</span>`:''}).join('');
  el.innerHTML=`<div class="nb"></div><div class="nt"><span class="ni">${ti}</span><div class="ntx">${n.title||'Sin título'}</div></div><div class="nbd"><span class="${tb}">${tl}</span>${n.actor?`<span class="bg bac">${n.actor}</span>`:''}</div>${fl?`<div class="nf">${fl}</div>`:''}`;
  el.onclick=e=>{e.stopPropagation();openEd(ck,n.id)};return el;
}
function togL(id){const l=S.layers.find(x=>x.id===id);if(l){l.col=!l.col;saveS();render();}}
let cK=null,cN=null,isN=false,_t='action',_s='sn',_f=[];
function openNew(ck){if(S.mode==='pres')return;cK=ck;cN=null;isN=true;resetP();document.getElementById('pan-ti').textContent='Nuevo nodo';document.getElementById('pan').classList.remove('cl');}
function openEd(ck,nid){
  if(S.mode==='pres')return;cK=ck;cN=nid;isN=false;
  const n=(S.cells[ck]||[]).find(x=>x.id===nid);if(!n)return;
  document.getElementById('pan-ti').textContent='Editar nodo';
  document.getElementById('fti').value=n.title||'';document.getElementById('fac').value=n.actor||'';
  document.getElementById('fde').value=n.desc||'';document.getElementById('fno').value=n.notes||'';
  setT(n.type||'action',false);renderSt(n.status||'sn');renderFl(n.flags||[]);
  document.getElementById('pan').classList.remove('cl');
}
function resetP(){document.getElementById('fti').value='';document.getElementById('fac').value='';document.getElementById('fde').value='';document.getElementById('fno').value='';setT('action',false);renderSt('sn');renderFl([]);}
function closeP(){document.getElementById('pan').classList.add('cl');cK=null;cN=null;}
function setT(t,_){_t=t;document.getElementById('ta').className='tb'+(t==='action'?' ta':'');document.getElementById('tt').className='tb'+(t==='touch'?' tt':'');}
function renderSt(sel){_s=sel;const g=document.getElementById('stg');g.innerHTML='';ST.forEach(s=>{const d=document.createElement('button');d.className='so'+(s.id===sel?' sel':'');d.style.borderColor=s.c;d.style.color=s.c;if(s.id===sel)d.style.background=s.c+'33';d.textContent=s.l;d.onclick=()=>renderSt(s.id);g.appendChild(d);});}
function renderFl(sel){_f=[...sel];const g=document.getElementById('flg');g.innerHTML='';FL.forEach(f=>{const b=document.createElement('button');b.className='fb'+(_f.includes(f.id)?' on':'');b.textContent=f.e+' '+f.l;b.onclick=()=>{if(_f.includes(f.id))_f=_f.filter(x=>x!==f.id);else _f.push(f.id);renderFl(_f);};g.appendChild(b);});}
function saveN(){
  const t=document.getElementById('fti').value.trim();if(!t){document.getElementById('fti').style.borderColor='#A32D2D';return;}
  document.getElementById('fti').style.borderColor='';
  const nd={title:t,type:_t,actor:document.getElementById('fac').value.trim(),desc:document.getElementById('fde').value.trim(),notes:document.getElementById('fno').value.trim(),status:_s,flags:[..._f]};
  if(!S.cells[cK])S.cells[cK]=[];
  if(isN){nd.id=uid();S.cells[cK].push(nd);}else{const i=S.cells[cK].findIndex(x=>x.id===cN);if(i>=0){nd.id=cN;S.cells[cK][i]=nd;}}
  saveS();render();closeP();
}
function delN(){if(!cK||!cN)return;if(!confirm('¿Eliminar este nodo?'))return;S.cells[cK]=(S.cells[cK]||[]).filter(x=>x.id!==cN);saveS();render();closeP();}
let mm='add',ePid=null,_mc=COLS[0];
function renderMC(sel){const c=document.getElementById('mc');c.innerHTML='';COLS.forEach(col=>{const s=document.createElement('div');s.className='cs';s.style.background=col;if(col===sel)s.style.borderColor='#fff';s.onclick=()=>{_mc=col;renderMC(col);};c.appendChild(s);});}
function openAdd(){mm='add';_mc=COLS[0];document.getElementById('mti').textContent='Nueva fase';document.getElementById('mn').value='';document.getElementById('mi').value='📌';document.getElementById('mok').textContent='Crear';renderMC(_mc);document.getElementById('mb').classList.add('op');}
function openEdit2(id){mm='edit';ePid=id;const p=S.phases.find(x=>x.id===id);if(!p)return;_mc=p.c;document.getElementById('mti').textContent='Editar fase';document.getElementById('mn').value=p.nm;document.getElementById('mi').value=p.ic;document.getElementById('mok').textContent='Guardar';renderMC(_mc);document.getElementById('mb').classList.add('op');}
function closeMd(){document.getElementById('mb').classList.remove('op');}
function okMd(){const n=document.getElementById('mn').value.trim();const ic=document.getElementById('mi').value.trim()||'📌';if(!n)return;if(mm==='add'){S.phases.push({id:'p'+uid(),ic,nm:n,c:_mc,lb:'Fase '+(S.phases.length+1)});}else{const p=S.phases.find(x=>x.id===ePid);if(p){p.nm=n;p.ic=ic;p.c=_mc;}}saveS();render();closeMd();}
document.getElementById('mb').onclick=e=>{if(e.target===document.getElementById('mb'))closeMd();};
function setMode(m){S.mode=m;if(m==='pres'){document.body.classList.add('pres');document.getElementById('bw').className='btn';document.getElementById('bp2').className='btn act';closeP();}else{document.body.classList.remove('pres');document.getElementById('bw').className='btn act';document.getElementById('bp2').className='btn';}saveS();}
function doExp(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`blueprint_nav_${new Date().toISOString().slice(0,10)}.json`;a.click();}
function doImp(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.phases&&d.layers){S=d;saveS();render();}else alert('Archivo no válido.');}catch{alert('Error al leer.');}};r.readAsText(f);};inp.click();}
loadS();render();
</script>
